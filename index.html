<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="BOOGUELS TAPLIST">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>BOOGUELS BREW TAPLIST</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="stylesheet" href="style.css?v=master1">
</head>
<body>
<main class="screen">
  <img src="master.png?v=master1" class="master" alt="BOOGUELS BREW TAPLIST">
  <button class="zone z1" data-tap="1"></button>
  <button class="zone z2" data-tap="2"></button>
  <button class="zone z3" data-tap="3"></button>
  <button class="zone z4" data-tap="4"></button>
  <button class="zone z5" data-tap="5"></button>
  <button class="zone z6" data-tap="6"></button>
</main>

<aside id="editor" class="editor hidden">
  <div class="top">
    <h2 id="title">Bec</h2>
    <button id="close">×</button>
  </div>
  <label>Statut
    <select id="status">
      <option value="online">En service</option>
      <option value="empty">Empty Tap</option>
    </select>
  </label>
  <label>Nom <input id="name"></label>
  <label>Style <input id="style"></label>
  <div class="two">
    <label>ABV <input id="abv"></label>
    <label>IBU <input id="ibu"></label>
  </div>
  <label>Houblons / ingrédients <textarea id="extras" rows="4"></textarea></label>
  <p class="note">Cette version affiche le master graphique verrouillé en haute qualité. Les champs sont prêts pour la prochaine étape dynamique.</p>
  <button id="save">Sauvegarder</button>
</aside>

<script src="app.js?v=master1"></script>
</body>
</html>
