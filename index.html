<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="BOOGUELS TAP OS">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>BOOGUELS TAP OS V10</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="stylesheet" href="style.css?v=10">
</head>
<body>
<main id="app">
  <section id="tapgrid"></section>
</main>

<div id="modal" class="modal hidden">
  <form id="tapForm" class="panel">
    <div class="panelHead">
      <h2 id="modalTitle">Tap</h2>
      <button type="button" id="closeBtn">×</button>
    </div>

    <label>Statut
      <select id="status">
        <option value="online">En service</option>
        <option value="empty">Empty Tap</option>
      </select>
    </label>

    <label>Nom
      <input id="name" autocomplete="off">
    </label>

    <label>Style
      <input id="style" autocomplete="off">
    </label>

    <div class="two">
      <label>ABV %
        <input id="abv" autocomplete="off">
      </label>
      <label>IBU
        <input id="ibu" autocomplete="off">
      </label>
    </div>

    <label>Houblons / ingrédients
      <textarea id="extras" rows="3" placeholder="Une ligne par ingrédient"></textarea>
    </label>

    <div class="two">
      <label>Couleur
        <select id="accent">
          <option value="cyan">Cyan</option>
          <option value="red">Rouge</option>
          <option value="purple">Violet</option>
          <option value="orange">Orange</option>
          <option value="green">Vert</option>
          <option value="blue">Bleu</option>
          <option value="gold">Or</option>
          <option value="grey">Gris</option>
        </select>
      </label>
      <label>Verre
        <select id="glass">
          <option value="hazy">Hazy IPA</option>
          <option value="westcoast">West Coast / Pale</option>
          <option value="pilsner">Pilsner</option>
          <option value="kolsch">Kölsch</option>
          <option value="stout">Stout</option>
          <option value="pastry">Pastry Stout</option>
          <option value="sour">Sour / Gose</option>
          <option value="wheat">Wheat</option>
          <option value="brown">Brown Ale</option>
          <option value="oldale">Old Ale</option>
          <option value="barleywine">Barleywine</option>
          <option value="empty">Verre vide</option>
        </select>
      </label>
    </div>

    <div id="preview" class="preview"></div>

    <div class="actions">
      <button type="button" id="resetBtn">Reset local</button>
      <button type="button" id="emptyBtn">Empty Tap</button>
      <button type="submit" class="save">Sauvegarder</button>
    </div>
  </form>
</div>

<script src="app.js?v=10"></script>
</body>
</html>
